<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize/modern-normalize.css">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up Form</title>
</head>
<body>
    <div class="left-container">
        <div class="logo-container">
            <img src="pictures/odin-lined.png" alt="Odin norse">
            <p class="left-container-text">Odin</p>
        </div>
        <div class="credits">
            <p class="actually-credits">Photo by <a class='links' href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a> on <a class='links' href="https://unsplash.com/" target="_blank">Unsplash</a></p>
        </div>
    </div>
    <div class="right-container">
        <div class="top-container">
            <p class= "p1">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
            <p class="p2">Sign up <i>now</i> to get started</p>
            <p class="p2">You <i>know</i> you want to.</p>
        </div>
        <div class="middle-container">
            <p class="p3">Let's do this!</p>
            <form id="sign-up-form" action="#" method="POST">
            <div class="first-row-form">
                <div class="for-first-name">
                    <label for="first-name">FIRST NAME *</label>
                    <input type="text" id="first-name" name="first-name" placeholder="John" minlength="3" required>
                </div>
                <div class='for-last-name'>
                    <label for="last-name">LAST NAME *</label>
                    <input type="text" id="last-name" name="last-name" placeholder="Smith" minlength="3" required>
                </div>
            </div>
            <div class="second-row-form">
                <div class="for-email">
                    <label for="email">EMAIL *</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div class='for-num'>
                    <label for="num">NUMBER</label>
                    <input type="tel" id="num" name="num" min="9" max="9">
                </div>
            </div>
            <div class="third-row-form">
                <div class="for-password">
                    <label for="password">PASSWORD *</label>
                    <input type="password" id="password" name="password" minlength="8" required>
                </div>
                <div class='for-password2'>
                    <label for="password2">CONFIRM PASSWORD *</label>
                    <input type="password" id="password2" name="password2" minlength="8" required>
                </div>
            </div>
            </form>
        </div>
        <div class="third-container">
            <button type="submit" id="submit-button" name="submit-button" form="sign-up-form">Create Account</button>
            <p class="p4">Already have an account? <a href="#" class="login-class">Log in</a></p>
        </div>
    </div>
    
</body>
</html>
